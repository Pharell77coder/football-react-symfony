security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api_public:
            pattern: ^/api/(auth/(inscription|connexion)|doc|health)
            stateless: true
            security: false

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    access_control:
        # Routes publiques
        - { path: ^/api/auth/inscription, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/connexion,   roles: PUBLIC_ACCESS }
        - { path: ^/api/health,           roles: PUBLIC_ACCESS }
        - { path: ^/api/doc,              roles: PUBLIC_ACCESS }

        # Lecture pour tous les connectés
        - { path: ^/api/rencontres, roles: IS_AUTHENTICATED_FULLY, methods: [GET] }
        - { path: ^/api/joueurs,    roles: IS_AUTHENTICATED_FULLY, methods: [GET] }
        - { path: ^/api/equipes,    roles: IS_AUTHENTICATED_FULLY, methods: [GET] }

        # Écriture réservée aux admins
        - { path: ^/api/rencontres, roles: ROLE_ADMIN, methods: [POST, PUT, DELETE] }
        - { path: ^/api/joueurs,    roles: ROLE_ADMIN, methods: [POST, PUT, DELETE] }
        - { path: ^/api/equipes,    roles: ROLE_ADMIN, methods: [POST, PUT, DELETE] }
        - { path: ^/api/users,      roles: ROLE_ADMIN }

        # Auth routes
        - { path: ^/api/auth, roles: IS_AUTHENTICATED_FULLY }
